<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}AI Tutor{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root { --bg:#0b1020; --panel:#11162a; --ink:#e5e7eb; --muted:#9ca3af; }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .shell { max-width: 980px; margin: 24px auto; padding: 0 12px; }
    .nav { display:flex; gap:10px; margin-bottom: 14px; align-items:center; }
    .nav a { color: var(--ink); text-decoration: none; padding: 6px 10px; border-radius: 8px; background: var(--panel); }
    .card { background: var(--panel); border-radius: 12px; padding: 14px; }
    .row { margin-bottom: 12px; }
    textarea, input[type="text"] { width: 100%; background: #0f152a; color: var(--ink); border: 1px solid #2a3356; border-radius: 8px; padding: 10px; }
    button { background: #335cff; color:#fff; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg { padding: 10px 12px; border-radius: 10px; margin: 8px 0; white-space: pre-wrap; }
    .msg.user { background: #1f2937; color: #fff; }
    .msg.model { background: #0f152a; border: 1px solid #2a3356; }
    .muted { color: var(--muted); }
    .errors { background: #3b0e14; border: 1px solid #a22; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
  </style>

  {% block head %}{% endblock %}
</head>
<body>
<div class="shell">
  <div class="nav">
    <a href="{% url 'init' %}">Initialize</a>
    <a href="{% url 'chat' %}">Chat</a>
  </div>

  {% block content %}{% endblock %}
</div>
</body>
</html>
