<!-- base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MasteryPilot{% endblock %}</title>

  <!-- Tailwind CSS via CDN (for prototype) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 500: '#5b6df2', 600: '#3f51d7', 700: '#2f3dad' }
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-semibold text-brand-600 text-lg">
        <div class="h-7 w-7 bg-brand-600 rounded-lg"></div>
        MasteryPilot
      </a>
      <div class="flex items-center gap-6 text-sm">
        <a href="/" class="hover:text-brand-700">Home</a>
        {% if user.is_authenticated %}
          <span class="text-gray-500">Hi, {{ user.username }}</span>
          <form action="/logout/" method="post" class="inline">
            {% csrf_token %}
            <button type="submit" class="hover:text-brand-700">Logout</button>
          </form>
        {% else %}
          <a href="/login/" class="hover:text-brand-700">Login</a>
          <a href="/signup/" class="hover:text-brand-700">Signup</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
