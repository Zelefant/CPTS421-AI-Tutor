<!-- chat.html -->
{% extends "base.html" %}
{% block title %}Chat · MasteryPilot{% endblock %}
{% block content %}
<div class="grid lg:grid-cols-[240px_minmax(0,1fr)] gap-6">

  <!-- Left Sidebar (Sessions) -->
  <aside class="bg-white rounded-2xl border shadow-sm p-4 self-start">
    <div class="flex items-center justify-between mb-2">
      <h3 class="font-semibold">Sessions</h3>
      <button id="newSession" class="text-sm text-brand-600 hover:underline">New</button>
    </div>
    <ul id="sessionList" class="space-y-2 text-sm">
      <!-- Real sessions will be inserted here by JS -->
    </ul>
  </aside>

  <!-- Main Chat Window -->
  <section class="bg-white rounded-2xl border shadow-sm flex flex-col w-full max-w-3xl mx-auto h-[calc(100vh-7.5rem)]">

    <!-- Quiz Card (hidden by default, shown when quiz is active) -->
    <div id="quizCard" class="mb-4 hidden">
      <div class="bg-white border rounded-2xl shadow p-6">
        <h3 class="font-semibold text-lg mb-2">Quiz</h3>
        <form id="quizForm" class="space-y-4"></form>
        <button id="submitQuizBtn" type="button"
          class="mt-2 rounded-xl bg-brand-600 text-white px-4 py-2 font-semibold hover:bg-brand-700 transition">
          Submit Answers
        </button>
      </div>
    </div>

    <div id="chatLog" class="flex-1 overflow-y-auto p-5 space-y-4">
      <div class="flex gap-3">
        <div class="h-8 w-8 rounded-full bg-brand-600 shrink-0"></div>
        <div class="bg-gray-100 rounded-2xl px-4 py-2" id="initial-chat">
          Initializing...
        </div>
      </div>
    </div>

    <!-- Message Input -->
    <div class="border-t p-3">
      <form id="chatForm" class="flex items-center gap-2">
        <input id="chatInput" class="flex-1 rounded-xl border px-3 py-2 focus:ring-2 focus:ring-brand-500"
          placeholder="Type your question...">
        <button id="chat-send-button"
          class="rounded-xl bg-brand-600 text-white px-4 py-2 font-semibold hover:bg-brand-700 transition">
          Send
        </button>
      </form>
    </div>
    <div id="typing-alert-div" class="px-4 py-2 font-semibold"></div>

    <!-- Quiz Feedback Modal (hidden by default) -->
    <div id="quizFeedbackModal"
      class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-2xl shadow-lg p-6 max-w-md w-full">
        <h3 class="font-semibold text-lg mb-2">Quiz Results</h3>
        <div id="quizFeedbackContent" class="mb-4"></div>
        <button id="closeQuizFeedback"
          class="rounded-xl bg-brand-600 text-white px-4 py-2 font-semibold hover:bg-brand-700 transition">
          Close
        </button>
      </div>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>
  // --- CSRF helpers (must be first) ---
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";");
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.startsWith(name + "=")) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
  const csrftoken = getCookie("csrftoken");

  // --- DOM refs / state ---
  const chatForm = document.getElementById("chatForm");
  const chatInput = document.getElementById("chatInput");
  const chatLog = document.getElementById("chatLog");
  const typingAlertDiv = document.getElementById("typing-alert-div");
  const initialChat = document.getElementById("initial-chat");
  const quizCard = document.getElementById("quizCard");
  const quizForm = document.getElementById("quizForm");
  const submitQuizBtn = document.getElementById("submitQuizBtn");
  const quizFeedbackModal = document.getElementById("quizFeedbackModal");
  const quizFeedbackContent = document.getElementById("quizFeedbackContent");
  const closeQuizFeedback = document.getElementById("closeQuizFeedback");
  let currentSessionId = null;
  let quizAttempts = [];
  let quizAttemptIndex = 0;
  let quizActive = false;
  let activeQuizText = null;
  let activeQuizObj = null;

  // --- Main chat submit ---
  chatForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (quizActive) return;
    const text = chatInput.value.trim();
    if (!text) return;

    appendMessage("user", text);
    chatInput.value = "";
    await showTypingAlert();

    try {
      const res = await fetch("{% url 'api_chat' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrftoken
        },
        credentials: "same-origin",
        body: JSON.stringify({
          message: text,
          session_id: currentSessionId
        })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      if (data.session_title && currentSessionId) {
        const titleEl = document.querySelector(
          `#sessionList li[data-session-id="${currentSessionId}"] .session-title`
        );
        if (titleEl) titleEl.textContent = data.session_title;
      }

      const quizObj = parseQuizJson(data.model_text);
      if (quizObj) {
        activeQuizText = data.model_text;
        activeQuizObj = quizObj;
        showQuizCard(quizObj);
      } else {
        appendMessage("model", data.model_text || "(no text)");
      }
    } catch (err) {
      appendMessage("model", "Error: " + err.message);
    }

    await removeTypingAlert();
  });

  // --- Quiz parsing helpers ---
  function isQuizJson(text) {
    const quizObj = extractQuizObject(text);
    return !!quizObj;
  }

  function parseQuizJson(text) {
    return extractQuizObject(text);
  }

  function extractQuizObject(text) {
    const obj = tryParseJSON(text);
    if (!obj) return null;

    const unwrap = (v) => {
      if (!v) return null;
      if (typeof v === "object") return v;
      if (typeof v === "string") return tryParseJSON(v) || null;
      return null;
    };

    const quizVal = unwrap(obj.quiz) || unwrap(obj.test) || unwrap(obj.questions);
    if (quizVal) return quizVal;

    const keys = Object.keys(obj);
    if (keys.some(k => /^q\d+$/i.test(k))) return obj;
    return null;
  }

  function tryParseJSON(text) {
    if (!text || typeof text !== "string") return null;
    let jsonText = text.trim();
    jsonText = jsonText.replace(/[\n\r\t]/g, " ");
    jsonText = jsonText.replace(/'([a-zA-Z0-9_]+)'\s*:/g, '"$1":');
    jsonText = jsonText.replace(/: '([^']*)'/g, ': "$1"');
    jsonText = jsonText.replace(/,\s*([}\]])/g, "$1");
    let match = jsonText.match(/\{[\s\S]*\}/);
    if (match) {
      try {
        return JSON.parse(match[0]);
      } catch (e) {}
    }
    try {
      return JSON.parse(jsonText);
    } catch (e) {
      return null;
    }
  }

  // --- Quiz rendering ---
  function showQuizCard(quizObj) {
    quizActive = true;
    quizCard.classList.remove("hidden");
    chatInput.disabled = true;
    document.getElementById("chat-send-button").disabled = true;
    quizForm.innerHTML = "";

    Object.entries(quizObj).forEach(([qid, qdata]) => {
      const safeQid = escapeHtml(String(qid));
      const questionHtml = renderMarkdownWithMath(qdata.question || "");
      let html = "";
      html += `<div class='mb-2'><label class='font-semibold block'>${questionHtml}</label>`;
      if (qdata.type === "multiple-choice" && qdata.answers) {
        html += `<div class='space-y-1 mt-1'>`;
        qdata.answers.forEach((ans, i) => {
          const answerHtml = renderMarkdownWithMath(String(ans ?? ""));
          html += `<label class='flex items-center gap-2'><input type='radio' name='${safeQid}' value='${i + 1}' class='form-radio'><span>${answerHtml}</span></label>`;
        });
        html += `</div>`;
      } else if (qdata.type === "short-answer") {
        html += `<input type='text' name='${safeQid}' class='mt-1 rounded border px-2 py-1 w-full'>`;
      }
      html += `</div>`;
      quizForm.innerHTML += html;
    });

    setTimeout(() => {
      try {
        quizCard.scrollIntoView({ behavior: "smooth", block: "center" });
        const firstInput = quizForm.querySelector("input, textarea, select");
        if (firstInput) {
          firstInput.focus({ preventScroll: true });
          if (firstInput.type === "radio") {
            firstInput.checked = true;
          }
        }
      } catch (e) {
        console.debug("quiz scroll/focus failed", e);
      }
    }, 50);
  }

  // --- Quiz submit / grading ---
  submitQuizBtn.addEventListener("click", async (e) => {
    e.preventDefault();
    const formEntries = Array.from(new FormData(quizForm).entries());
    const csvString = formEntries
      .map(([, v]) => (typeof v === "string" && v.includes(",") ? `"${v}"` : v))
      .join(",");

    await showTypingAlert();
    try {
      const res = await fetch("{% url 'api_grade_quiz' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrftoken
        },
        credentials: "same-origin",
        body: JSON.stringify({ answers: csvString })
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      const attempt = buildLocalQuizAttempt(formEntries, data.model_text);
      if (activeQuizText && attempt) {
        appendMessage("model", activeQuizText, attempt);
      }
      showQuizFeedbackModal(data.model_text);
    } catch (err) {
      showQuizFeedbackModal("Error: " + err.message);
    }
    await removeTypingAlert();
    quizCard.classList.add("hidden");
    quizActive = false;
    activeQuizText = null;
    activeQuizObj = null;
    chatInput.disabled = false;
    document.getElementById("chat-send-button").disabled = false;
  });

  // Build a quizAttempt shaped like /api/session/<id>/messages/ returns,
  // so renderReadOnlyQuiz can show student answers + correctness immediately.
  function buildLocalQuizAttempt(formEntries, gradeText) {
    if (!activeQuizObj) return null;
    let grades = {};
    try {
      grades = JSON.parse(gradeText) || {};
    } catch {
      grades = {};
    }
    const answersByQid = new Map(formEntries.map(([qid, val]) => [String(qid), String(val)]));
    const items = Object.entries(activeQuizObj).map(([qid, qdata]) => {
      const raw = answersByQid.get(qid) || "";
      let studentAnswer = raw;
      if (qdata && qdata.type === "multiple-choice" && Array.isArray(qdata.answers)) {
        const idx = parseInt(raw, 10) - 1;
        if (idx >= 0 && idx < qdata.answers.length) {
          studentAnswer = String(qdata.answers[idx]);
        }
      }
      const fb = String(grades[qid] || "");
      const isCorrect = fb.startsWith("correct");
      return { qid, student_answer: studentAnswer, is_correct: isCorrect };
    });
    return { has_submission: true, items };
  }

  function showQuizFeedbackModal(feedbackText) {
    let formatted = "";
    let results = null;
    try {
      results = typeof feedbackText === "string" ? JSON.parse(feedbackText) : feedbackText;
    } catch {
      const start = feedbackText.indexOf("{");
      const end = feedbackText.lastIndexOf("}");
      if (start !== -1 && end !== -1 && end > start) {
        try {
          results = JSON.parse(feedbackText.slice(start, end + 1));
        } catch {}
      }
    }
    if (results && typeof results === "object") {
      formatted += `<div class='space-y-2'>`;
      Object.entries(results).forEach(([qid, val]) => {
        let correct = false, explanation = "";
        if (typeof val === "string") {
          correct = val.startsWith("correct");
          explanation = val.replace(/^correct-?|^incorrect-?/, "");
        }
        formatted += `<div class='flex items-start gap-2'>`;
        formatted += correct
          ? `<span class='inline-block h-6 w-6 bg-brand-600 rounded-full flex items-center justify-center text-white font-bold'>✓</span>`
          : `<span class='inline-block h-6 w-6 bg-red-500 rounded-full flex items-center justify-center text-white font-bold'>✗</span>`;
        formatted += `<div><span class='font-semibold'>${qid.toUpperCase()}:</span> `;
        formatted += correct
          ? `<span class='text-brand-700'>Correct</span>`
          : `<span class='text-red-600'>Incorrect</span>`;
        if (explanation) {
          formatted += `<div class='text-sm text-gray-700 mt-1'>${renderMarkdownWithMath(explanation)}</div>`;
        }
        formatted += `</div></div>`;
      });
      formatted += `</div>`;
    } else {
      formatted = `<pre class='text-sm'>${escapeHtml(String(feedbackText ?? ""))}</pre>`;
    }
    quizFeedbackContent.innerHTML = formatted;
    quizFeedbackModal.classList.remove("hidden");
  }

  closeQuizFeedback.addEventListener("click", () => {
    quizFeedbackModal.classList.add("hidden");
    quizFeedbackContent.innerText = "";
  });

  // --- Typing indicator helpers ---
  function showTypingAlert() {
    const alert = document.createElement("p");
    alert.id = "typing-alert-message";
    alert.innerHTML = "Your AI tutor is typing...";
    typingAlertDiv.appendChild(alert);
    document.getElementById("chat-send-button").disabled = true;
  }

  function removeTypingAlert() {
    const alert = document.getElementById("typing-alert-message");
    if (alert) typingAlertDiv.removeChild(alert);
    document.getElementById("chat-send-button").disabled = false;
  }

  // --- Message rendering ---
  function appendMessage(role, text, quizAttempt = null) {
    const div = document.createElement("div");
    div.className = role === "user" ? "flex gap-3 justify-end" : "flex gap-3";
    if (role === "user") {
      div.innerHTML = `<div class='bg-brand-600 text-white rounded-2xl px-4 py-2 max-w-[75%]'>${escapeHtml(text || "")}</div>`;
    } else {
      const rendered = formatTeacherMessage(text || "", quizAttempt);
      div.innerHTML = `<div class='h-8 w-8 rounded-full bg-brand-600 shrink-0'></div>
         <div class='bg-gray-100 rounded-2xl px-4 py-2 max-w-[75%]'>${rendered}</div>`;
    }
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function formatTeacherMessage(text, quizAttempt) {
    const quizObj = parseQuizJson(text);
    if (!quizObj) return renderMarkdownWithMath(text);
    return renderReadOnlyQuiz(quizObj, quizAttempt);
  }

  // --- Markdown + LaTeX rendering ---
  // Strategy: extract math spans to placeholders BEFORE markdown parsing so
  // marked's emphasis/italic parser does not corrupt things like $a_b$ or $x^2$.
  // Then render each extracted expression with KaTeX and splice back in.
  function renderMarkdownWithMath(text) {
    const src = String(text || "");
    if (!src) return "";
    const placeholders = [];
    const takePlaceholder = (expr, display) => {
      const idx = placeholders.length;
      placeholders.push({ expr: String(expr || "").trim(), display: !!display });
      return `@@MATH_${idx}@@`;
    };

    // Block math: $$...$$  and  \[...\]
    let working = src
      .replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => takePlaceholder(expr, true))
      .replace(/\\\[([\s\S]+?)\\\]/g, (_, expr) => takePlaceholder(expr, true));

    // Inline math: $...$  and  \(...\)
    // Tolerate the model's occasional "$ expr $" (surrounding whitespace).
    working = working
      .replace(/\$\s*([^$\n]+?)\s*\$/g, (_, expr) => takePlaceholder(expr, false))
      .replace(/\\\(([\s\S]+?)\\\)/g, (_, expr) => takePlaceholder(expr, false));

    let html;
    try {
      html = (typeof marked !== "undefined" && marked.parse)
        ? marked.parse(working, { breaks: true, gfm: true })
        : escapeHtml(working).replace(/\n/g, "<br>");
    } catch (e) {
      html = escapeHtml(working).replace(/\n/g, "<br>");
    }

    html = html.replace(/@@MATH_(\d+)@@/g, (_, i) => {
      const ph = placeholders[Number(i)];
      if (!ph) return "";
      if (typeof katex === "undefined") return escapeHtml(ph.expr);
      try {
        return katex.renderToString(ph.expr, {
          throwOnError: false,
          displayMode: ph.display,
        });
      } catch (e) {
        return `<code>${escapeHtml(ph.expr)}</code>`;
      }
    });

    if (typeof DOMPurify !== "undefined") {
      return DOMPurify.sanitize(html, {
        ADD_ATTR: ["style", "aria-hidden"],
      });
    }
    return html;
  }

  function renderReadOnlyQuiz(quizObj, quizAttempt) {
    const attemptMap = new Map();
    const hasSubmission = !!(quizAttempt && quizAttempt.has_submission);
    if (quizAttempt && Array.isArray(quizAttempt.items)) {
      quizAttempt.items.forEach(item => {
        if (!item || !item.qid) return;
        attemptMap.set(String(item.qid), item);
      });
    }

    let html = `<div class="space-y-3">`;
    html += `<div class="font-semibold text-gray-900">Quiz (read only)</div>`;

    Object.entries(quizObj).forEach(([qid, qdata], idx) => {
      if (!qdata || typeof qdata !== "object") return;

      const question = qdata.question || `Question ${idx + 1}`;
      const qType = (qdata.type || "").toLowerCase();
      const correct = String(qdata.correct ?? "").trim();
      const attempt = attemptMap.get(String(qid));
      const studentAnswer = attempt && attempt.student_answer ? String(attempt.student_answer) : "";
      const isCorrect = attempt && typeof attempt.is_correct === "boolean" ? attempt.is_correct : null;

      html += `<div class="rounded-xl border border-gray-200 bg-white p-3 space-y-2">`;
      html += `<div class="text-sm font-semibold text-gray-900">${idx + 1}. ${renderMarkdownWithMath(question)}</div>`;

      if (qType === "multiple-choice" && Array.isArray(qdata.answers)) {
        html += `<ul class="space-y-1">`;
        qdata.answers.forEach((ans, i) => {
          const choiceText = String(ans ?? "");
          const choiceNumber = String(i + 1);
          // Model emits 0-based `correct` index (matches server grading in
          // api_grade_quiz, which does `(user - 1) == correct`). Compare on
          // the 0-based index, then fall back to a text match for robustness.
          const isRightChoice = correct === String(i) || correct.toLowerCase() === choiceText.trim().toLowerCase();
          const isStudentChoice = studentAnswer && studentAnswer.trim().toLowerCase() === choiceText.trim().toLowerCase();
          const liClass = isRightChoice
            ? "bg-green-100 text-green-800 border border-green-300"
            : (isStudentChoice ? "bg-blue-100 text-blue-800 border border-blue-300" : "text-gray-700");
          html += `<li class="rounded-md px-2 py-1 text-sm ${liClass}">`;
          html += `${escapeHtml(choiceNumber)}. ${renderMarkdownWithMath(choiceText)}`;
          if (isRightChoice) html += ` <span class="ml-1 font-semibold">(Correct answer)</span>`;
          if (isStudentChoice && !isRightChoice) html += ` <span class="ml-1 font-semibold">(Student answer)</span>`;
          if (isStudentChoice && isRightChoice) html += ` <span class="ml-1 font-semibold">(Student answered this)</span>`;
          html += `</li>`;
        });
        html += `</ul>`;
      } else {
        html += `<div class="text-sm text-gray-700">Correct answer: <span class="font-semibold text-green-700">${renderMarkdownWithMath(correct || "N/A")}</span></div>`;
      }

      if (hasSubmission && attempt) {
        html += `<div class="text-sm text-gray-700">Student answer: <span class="font-semibold ${isCorrect === true ? "text-green-700" : (isCorrect === false ? "text-red-700" : "text-gray-800")}">${renderMarkdownWithMath(studentAnswer || "No answer")}</span></div>`;
        if (isCorrect === true) {
          html += `<div class="text-xs font-semibold text-green-700">Result: Correct</div>`;
        } else if (isCorrect === false) {
          html += `<div class="text-xs font-semibold text-red-700">Result: Incorrect</div>`;
        }
      }

      html += `</div>`;
    });

    html += `</div>`;
    return html;
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // --- Build a single <li> for the sessions list ---
  function renderSessionListItem(session) {
    const li = document.createElement("li");
    li.className = "session-item flex justify-between items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer";
    li.dataset.sessionId = session.id;
    li.innerHTML = `
      <span class="session-title">${escapeHtml(session.title)}</span>
      <div class="flex gap-2">
        <button class="rename-btn text-blue-500" data-id="${session.id}">✏️</button>
        <button class="delete-btn text-red-500" data-id="${session.id}">🗑️</button>
      </div>
    `;
    li.addEventListener("click", (e) => {
      if (e.target.classList.contains("rename-btn")) return;
      if (e.target.classList.contains("delete-btn")) return;
      loadSessionMessages(session.id);
    });
    return li;
  }

  // --- New Session button ---
  document.getElementById("newSession").addEventListener("click", async () => {
    try {
      const res = await fetch("{% url 'api_new_session' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrftoken
        },
        credentials: "same-origin",
        body: JSON.stringify({})
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      currentSessionId = data.id;

      const li = renderSessionListItem({ id: data.id, title: data.title });
      document.getElementById("sessionList").prepend(li);

      chatLog.innerHTML = "";
      const initial = data.model_text || `Session created: ${data.title}`;
      appendMessage("model", initial);
    } catch (err) {
      alert("Create session failed: " + err.message);
    }
  });

  // --- Load sessions on page load ---
  document.addEventListener("DOMContentLoaded", async () => {
    await loadSessions();
    const sessionList = document.getElementById("sessionList");
    if (sessionList.children.length === 0) {
      document.getElementById("newSession").click();
    } else {
      const firstSessionId = sessionList.children[0].dataset.sessionId;
      currentSessionId = firstSessionId;
      loadSessionMessages(firstSessionId);
    }
  });

  // --- Delete session ---
  document.addEventListener("click", async (e) => {
    if (e.target.classList.contains("delete-btn")) {
      const id = e.target.dataset.id;
      if (!confirm("Delete this chat? This cannot be undone.")) return;

      const res = await fetch(`/api/session/${id}/delete/`, {
        method: "DELETE",
        headers: {
          "X-CSRFToken": csrftoken
        },
        credentials: "same-origin"
      });

      if (res.ok) {
        e.target.closest("li").remove();
        chatLog.innerHTML = "";
      }
    }
  });

  // --- Rename session ---
  document.addEventListener("click", async (e) => {
    if (e.target.classList.contains("rename-btn")) {
      const id = e.target.dataset.id;
      const newName = prompt("Rename session:");
      if (!newName) return;

      const res = await fetch(`/api/session/${id}/rename/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrftoken
        },
        credentials: "same-origin",
        body: JSON.stringify({ title: newName })
      });

      if (res.ok) {
        e.target.closest("li").querySelector(".session-title").textContent = newName;
      }
    }
  });

  // --- Load sessions list ---
  async function loadSessions() {
    const sessionList = document.getElementById("sessionList");
    sessionList.innerHTML = "";
    try {
      const res = await fetch("{% url 'api_list_sessions' %}", {
        method: "GET",
        credentials: "same-origin"
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      data.sessions.forEach(session => {
        sessionList.appendChild(renderSessionListItem(session));
      });
    } catch (err) {
      console.error("Failed to load sessions:", err.message);
    }
  }

  // --- Load messages for a session ---
  async function loadSessionMessages(sessionId) {
    currentSessionId = sessionId;
    chatLog.innerHTML = "";
    quizAttempts = [];
    quizAttemptIndex = 0;

    try {
      const res = await fetch(`/api/session/${sessionId}/messages/`, {
        method: "GET",
        credentials: "same-origin"
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      quizAttempts = Array.isArray(data.quiz_attempts) ? data.quiz_attempts : [];

      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(msg => {
          let attempt = null;
          if (msg.role !== "user") {
            const quizObj = parseQuizJson(msg.text || "");
            if (quizObj && quizAttemptIndex < quizAttempts.length) {
              attempt = quizAttempts[quizAttemptIndex];
              quizAttemptIndex += 1;
            }
          }
          appendMessage(msg.role, msg.text, attempt);
        });
        return;
      }

      const initRes = await fetch("{% url 'api_init' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrftoken
        },
        credentials: "same-origin",
        body: JSON.stringify({ session_id: sessionId })
      });
      if (!initRes.ok) {
        const errText = await initRes.text();
        appendMessage("model", "Error initializing chat: " + errText);
        return;
      }

      const initData = await initRes.json();
      appendMessage("model", initData.model_text || "(no text)");
    } catch (err) {
      appendMessage("model", "Error loading chat: " + err.message);
    }
  }

</script>
{% endblock %}
